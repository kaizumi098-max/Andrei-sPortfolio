<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:radial-gradient(circle at top left,#ffd6ec,#f9b4d8,#f48ac2,#ec6fb4);
    overflow:hidden;
}

/* Soft glowing circles */
body::before,
body::after{
    content:"";
    position:absolute;
    border-radius:50%;
    filter:blur(60px);
    opacity:0.45;
}

body::before{
    width:220px;
    height:220px;
    background:#ffffff;
    top:40px;
    left:40px;
}

body::after{
    width:260px;
    height:260px;
    background:#ffb3dd;
    bottom:30px;
    right:30px;
}

.card{
    position:relative;
    width:390px;
    padding:45px;
    text-align:center;
    background:rgba(255,255,255,0.22);
    border:1px solid rgba(255,255,255,0.35);
    border-radius:24px;
    backdrop-filter:blur(14px);
    box-shadow:0 15px 40px rgba(0,0,0,0.15);
    z-index:1;
}

.logo{
    width:78px;
    height:78px;
    margin:auto;
    border-radius:50%;
    background:linear-gradient(135deg,#ffffff,#ffd7ee);
    color:#e2529f;
    font-size:30px;
    font-weight:bold;
    display:flex;
    align-items:center;
    justify-content:center;
    margin-bottom:22px;
    box-shadow:0 8px 18px rgba(255,255,255,0.45);
}

h1{
    color:#ffffff;
    font-size:30px;
    margin-bottom:28px;
    text-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.box{
    background:rgba(255,255,255,0.18);
    padding:18px;
    border-radius:14px;
    margin-bottom:14px;
}

.label{
    font-size:12px;
    color:#ffe7f4;
    letter-spacing:2px;
    margin-bottom:8px;
}

.value{
    font-size:20px;
    color:#ffffff;
    font-weight:bold;
}

.btn{
    display:block;
    margin-top:24px;
    padding:15px;
    text-decoration:none;
    background:linear-gradient(135deg,#ffffff,#ffd3ea);
    color:#d84291;
    font-weight:bold;
    border-radius:12px;
    transition:0.3s ease;
}

.btn:hover{
    transform:translateY(-4px);
    box-shadow:0 12px 24px rgba(255,255,255,0.35);
}

.footer{
    margin-top:18px;
    color:#fff3fa;
    font-size:12px;
    letter-spacing:1px;
}
</style>
</head>

<body>

<div class="card">

    <div class="logo">P</div>

    <h1>My Portfolio</h1>

    <div class="box">
        <div class="label">NAME</div>
        <div class="value">King Andrei S. Yambot</div>
    </div>

    <div class="box">
        <div class="label">SECTION</div>
        <div class="value">BSIT1 SOUTH 8</div>
    </div>

    <a href="Andrey_Yambot_Portfolio.pdf" target="_blank" class="btn">
        View Portfolio
    </a>

    <div class="footer">Portfolio</div>

</div>

</body>
</html>
